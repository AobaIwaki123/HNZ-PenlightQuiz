global:
  scrape_interval: 15s # default 15s
  evaluation_interval: 15s # default 15s
  scrape_timeout: 10s # default 10s

scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"

    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.

    static_configs:
      - targets: ["localhost:9090"] ## Address of Prometheus dashboard

  - job_name: "cloudflared"
    static_configs:
      - targets: ["cloudflare:60123"] ## cloudflared server IP and the --metrics port configured for the tunnel
